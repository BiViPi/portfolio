<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background circle with subtle engineering grid pattern -->
  <rect width="200" height="200" fill="#faf9f5"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f3a63" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#grid)"/>
  
  <!-- Subtle circular frame inside -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#0f3a63" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  
  <!-- Technical drawing crosshairs -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="#0f3a63" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="10" x2="100" y2="190" stroke="#0f3a63" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Minimalist Avatar Head and Shoulders -->
  <g fill="#0f3a63" opacity="0.75">
    <!-- Head/Hair -->
    <path d="M100,50 C85,50 75,60 75,75 C75,88 83,95 90,98 C82,108 60,115 60,135 C60,137 62,139 64,139 L136,139 C138,139 140,137 140,135 C140,115 118,108 110,98 C117,95 125,88 125,75 C125,60 115,50 100,50 Z" />
    
    <!-- Accent engineering collar details -->
    <path d="M92,105 L100,115 L108,105" fill="none" stroke="#faf9f5" stroke-width="1.5"/>
  </g>
  
  <!-- Text Label -->
  <text x="100" y="165" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#0f3a63" letter-spacing="1.5" text-anchor="middle" opacity="0.6">PORTRAIT</text>
  <text x="100" y="178" font-family="'Inter', sans-serif" font-size="7" font-weight="500" fill="#4b5563" letter-spacing="1" text-anchor="middle" opacity="0.5">PLACEHOLDER</text>
</svg>
