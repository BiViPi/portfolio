<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV · Phu Bui — Structural Draftsman</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--paper-soft); }
  body { padding: 32px 24px 64px; }

  /* The CV "sheet" — A4-ish, drop-shadow as if printed */
  .page-wrap {
    max-width: 820px;
    margin: 0 auto;
  }
  .sheet {
    background: var(--surface);
    box-shadow: var(--shadow-lifted);
    border-radius: 4px;
    padding: 56px 64px 64px;
    min-height: 1056px; /* ~US Letter ratio at this width */
  }
  .controls {
    max-width: 820px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .controls .label {
    font-size: 13px;
    color: var(--muted-2);
    font-family: var(--font-mono);
    margin-right: 4px;
  }
  .variant-btn {
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all var(--duration-micro) var(--ease-out);
  }
  .variant-btn:hover { border-color: var(--muted-4); }
  .variant-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .download-btn {
    margin-left: auto;
    padding: 8px 14px;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .download-btn:hover { background: var(--accent-hover); }

  /* Two-column variant */
  .sheet.two-col { padding: 0; display: grid; grid-template-columns: 250px 1fr; overflow: hidden; }
  .sheet.two-col .sidebar { background: var(--ink); color: var(--paper); padding: 40px 24px; }
  .sheet.two-col .main { padding: 40px 36px; }
  .sheet.two-col .sidebar .t-section { color: var(--paper); }
  .sheet.two-col .sidebar .t-meta { color: rgba(255,255,255,0.7); }
  .sheet.two-col .sidebar .t-body-ink { color: var(--paper); }

  @media print {
    body { background: #fff; padding: 0; }
    .controls { display: none; }
    .sheet { box-shadow: none; padding: 36pt 48pt; }
  }
</style>
</head>
<body>

<div class="controls">
  <span class="label">Variant:</span>
  <button class="variant-btn active" data-variant="single">Single-column</button>
  <button class="variant-btn" data-variant="two-col">Two-column</button>
  <button class="variant-btn" data-variant="hybrid">Hybrid</button>
  <button class="download-btn" onclick="window.print()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    Print / PDF
  </button>
</div>

<div class="page-wrap">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ==========================================
// 1. Shared CVIcon & CVSection Components
// ==========================================
const CVIcon = ({ name, size = 16, color = "currentColor" }) => {
  const paths = {
    mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
    phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>',
    pin: '<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
    globe: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
    briefcase: '<path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/>',
    "graduation-cap": '<path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>',
    wrench: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
    "folder-open": '<path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>',
    award: '<path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/>',
    languages: '<path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>',
    download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
    arrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
    arrowUpRight: '<path d="M7 7h10v10"/><path d="M7 17 17 7"/>',
    github: 'BRAND_GITHUB',
    linkedin: 'BRAND_LI',
  };
  if (paths[name] === 'BRAND_GITHUB') {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">
        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
      </svg>
    );
  }
  if (paths[name] === 'BRAND_LI') {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" xmlns="http://www.w3.org/2000/svg" dangerouslySetInnerHTML={{ __html: paths[name] }} />
  );
};

const CVSection = ({ icon, title, titleVi, children }) => (
  <section style={{ marginTop: 22 }}>
    <h2 className="t-section" style={{ marginBottom: 14 }}>
      {icon && <CVIcon name={icon} size={14} color="var(--accent)" />}
      <span>{title}</span>
      {titleVi && (
        <span style={{ color: "var(--muted-4)", fontWeight: 400, textTransform: "none", letterSpacing: 0, marginLeft: 6 }}>
          · {titleVi}
        </span>
      )}
    </h2>
    {children}
  </section>
);

// ==========================================
// 2. CVHeader & Contact Components
// ==========================================
const Dot = () => <span style={{ color: "var(--muted-4)" }}>·</span>;

const ContactItem = ({ icon, children, href }) => {
  const content = (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
      <CVIcon name={icon} size={14} color="var(--muted-3)" />
      <span>{children}</span>
    </span>
  );
  return href ? <a href={href} style={{ color: "var(--ink)", textDecoration: "none" }}>{content}</a> : content;
};

const PhotoPlaceholder = ({ initials = "PB" }) => (
  <div style={{
    width: 80, aspectRatio: "35 / 45",
    background: "linear-gradient(135deg, #cbd5e1, #94a3b8)",
    borderRadius: "var(--radius-sm)",
    display: "flex", alignItems: "flex-end", justifyContent: "center",
    paddingBottom: 8, color: "#fff", fontSize: 13, fontWeight: 700,
    letterSpacing: "-0.02em", flexShrink: 0,
  }}>{initials}</div>
);

const CVHeader = ({ profile, withPhoto = true }) => {
  const { name, name_en, title, role, email, location, links } = profile.personal_info;
  return (
    <header style={{ display: "flex", gap: 24, alignItems: "flex-start", paddingBottom: 20, borderBottom: "1px solid var(--line)" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <h1 className="t-name" style={{ fontSize: 26, marginBottom: 4 }}>
          {name} <span style={{ color: "var(--muted-3)", fontWeight: 400 }}>· {name_en}</span>
        </h1>
        <p className="t-lead" style={{ fontSize: 15, color: "var(--muted-1)", marginBottom: 14 }}>
          {role} · {title}
        </p>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 14, color: "var(--muted-1)", fontSize: 13, lineHeight: 1.4 }}>
          <ContactItem icon="mail" href={`mailto:${email}`}>{email}</ContactItem>
          <Dot />
          <ContactItem icon="pin">{location}</ContactItem>
          <Dot />
          <ContactItem icon="linkedin" href={links.linkedin}>in/phu-bui-016919222</ContactItem>
          <Dot />
          <ContactItem icon="github" href={links.github}>BiViPi</ContactItem>
        </div>
      </div>
      {withPhoto && <PhotoPlaceholder />}
    </header>
  );
};

// ==========================================
// 3. CVSummary & CVEducation Components
// ==========================================
const CVEducation = ({ education }) => (
  <CVSection icon="graduation-cap" title="Education" titleVi="Học vấn">
    <div>
      <div className="t-job" style={{ fontSize: 15 }}>{education.degree}</div>
      <div className="t-meta" style={{ marginTop: 2 }}>{education.style}</div>
    </div>
  </CVSection>
);

const CVSummary = ({ summary }) => (
  <section style={{ marginTop: 18, paddingBottom: 4 }}>
    <p className="t-lead" style={{ fontSize: 14.5, color: "var(--ink)", lineHeight: 1.55, margin: 0 }}>
      {summary}
    </p>
  </section>
);

// ==========================================
// 4. CVExperience Component
// ==========================================
const ExperienceItem = ({ item }) => (
  <article style={{ marginBottom: 18 }}>
    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
      <div>
        <div className="t-job" style={{ fontSize: 15 }}>
          {item.position} <span style={{ color: "var(--muted-3)", fontWeight: 400 }}>· {item.company}</span>
        </div>
        <div className="t-meta" style={{ marginTop: 2 }}>{item.location}</div>
      </div>
      <div className="t-mono" style={{ color: "var(--muted-2)", fontSize: 13 }}>{item.period}</div>
    </header>

    {item.description && (
      <p className="t-body" style={{ marginTop: 8, marginBottom: 8, color: "var(--muted-1)" }}>
        {item.description}
      </p>
    )}

    <ul style={{ margin: "8px 0 0", padding: 0, listStyle: "none" }}>
      {item.achievements.map((a, i) => (
        <li key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 6 }}>
          <span style={{ color: "var(--accent)", fontWeight: 700, lineHeight: 1.55, flexShrink: 0 }}>•</span>
          <span className="t-body-ink" style={{ fontSize: 14, lineHeight: 1.55 }}>{a}</span>
        </li>
      ))}
    </ul>

    {(item.software || item.automation) && (
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
        {[...(item.software || []), ...(item.automation || [])].map((s) => (
          <span key={s} className="chip chip-mono" style={{
            display: "inline-flex", padding: "3px 9px", borderRadius: 999, fontSize: 11,
            fontWeight: 500, background: "var(--line-soft)", color: "var(--ink)",
            border: "1px solid var(--line)", fontFamily: "var(--font-mono)",
          }}>{s}</span>
        ))}
      </div>
    )}
  </article>
);

const CVExperience = ({ items }) => (
  <CVSection icon="briefcase" title="Experience" titleVi="Kinh nghiệm">
    {items.map((it, i) => <ExperienceItem key={i} item={it} />)}
  </CVSection>
);

// ==========================================
// 5. CVSkills Component
// ==========================================
const SkillGroup = ({ label, items }) => (
  <div style={{ display: "flex", gap: 14, marginBottom: 8, alignItems: "baseline" }}>
    <div className="t-caption" style={{ minWidth: 110, color: "var(--muted-2)", flexShrink: 0, paddingTop: 2 }}>
      {label}
    </div>
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
      {items.map((s) => (
        <span key={s} style={{
          display: "inline-flex", padding: "3px 10px", borderRadius: 999, fontSize: 12,
          fontWeight: 500, background: "var(--accent-soft)", color: "var(--accent)",
          fontFamily: "var(--font-mono)",
        }}>{s}</span>
      ))}
    </div>
  </div>
);

const CVSkills = ({ skills }) => {
  const labels = {
    technical: "Technical",
    software: "Software",
    automation: "Automation",
    leadership: "Leadership",
  };
  return (
    <CVSection icon="wrench" title="Skills & Tools" titleVi="Kỹ năng">
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {Object.entries(skills).map(([key, items]) => (
          <SkillGroup key={key} label={labels[key] || key} items={items} />
        ))}
      </div>
    </CVSection>
  );
};

// ==========================================
// 6. Main Application Logic & Data
// ==========================================
const profile = {
  personal_info: {
    name: "Bùi Vĩnh Phú",
    name_en: "Phu Bui",
    title: "Structural Draftsman",
    role: "Team Leader",
    slogan: "Good, Better, Best.",
    email: "phubui277@gmail.com",
    location: "Vietnam",

      github: "https://github.com/BiViPi"
    }

    company: "SSIFT Vietnam",
    position: "Team Leader · Structural Draftsman",

    location: "Vietnam · Germany · Switzerland (remote)",
    description: "Coordinating and managing teams to implement civil, commercial, and bridge projects for the German and Swiss markets.",

    ],
    software: ["Allplan (Expert)"],
    automation: ["PythonParts", "Python"]
  }],
  skills: {
    technical: ["2D → 3D Structural Modeling", "Reinforcement Detailing", "DIN 1045-1 / SIA 262 / Eurocode 2", "IFC & Multi-discipline Coordination", "Reinforced Concrete (RC)"],
    software: ["Allplan (Expert)", "Microsoft Office (Excel, Word)"],
    automation: ["Python", "PythonParts API"],
    leadership: ["Team Leadership · 4-person team", "QA / QC before PM handover", "Training & Mentoring juniors"],
  },
  education: {
    degree: "Architectural Drafting Certificate",
    style: "Practical, experience-based learning · 12+ years on-the-job specialization"

function SingleColumnCV() {
  return (
    <div className="sheet">
      <CVHeader profile={profile} withPhoto={true} />
      <CVSummary summary={profile.summary} />
      <CVExperience items={profile.experience} />
      <CVSkills skills={profile.skills} />
      <CVEducation education={profile.education} />
    </div>
  );
}

function TwoColumnCV() {
  return (
    <div className="sheet two-col">
      <aside className="sidebar" style={{
        background: "linear-gradient(170deg, #7c72f7 0%, #6366f1 60%, #5b52e8 100%)",
      }}>
        {/* Photo placeholder */}
        <div style={{
          width: 84, aspectRatio: "35/45",
          background: "rgba(255,255,255,.18)",
          borderRadius: "var(--radius-sm)",
          border: "2px solid rgba(255,255,255,.35)",
          display: "flex", alignItems: "flex-end", justifyContent: "center",
          paddingBottom: 8, color: "#fff", fontSize: 14, fontWeight: 700,
          letterSpacing: "-0.02em", marginBottom: 20,
        }}>PB</div>

        {/* Name */}
        <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, lineHeight: 1.15, letterSpacing: "-0.01em", color: "#fff" }}>
          Bùi Vĩnh Phú
        </h1>
        <p style={{ color: "rgba(255,255,255,.75)", margin: "5px 0 28px", fontSize: 12.5, lineHeight: 1.4 }}>
          Phu Bui · {profile.personal_info.title}
        </p>

        {/* Contact */}
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(255,255,255,.5)", marginBottom: 8 }}>Contact</div>
        <div style={{ fontSize: 12, lineHeight: 1.8, color: "rgba(255,255,255,.9)", marginBottom: 26 }}>
          <div>{profile.personal_info.email}</div>
          <div>@chivasI8 · Telegram</div>
          <div>Vietnam (remote)</div>
          <div style={{ marginTop: 4 }}>
            <a href={profile.personal_info.links.linkedin} style={{ color: "rgba(255,255,255,.9)", textDecoration: "none", display: "block" }}>linkedin/in/phu-bui</a>
            <a href={profile.personal_info.links.github} style={{ color: "rgba(255,255,255,.9)", textDecoration: "none", display: "block" }}>github.com/BiViPi</a>
          </div>
        </div>

        {/* Skills */}
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(255,255,255,.5)", marginBottom: 8 }}>Skills</div>
        <ul style={{ listStyle: "none", padding: 0, margin: "0 0 26px", fontSize: 11.5, lineHeight: 1.85, color: "rgba(255,255,255,.9)" }}>
          {[...profile.skills.technical, ...profile.skills.software, ...profile.skills.automation].map(s => (
            <li key={s} style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
              <span style={{ color: "rgba(255,255,255,.4)", marginTop: 1, flexShrink: 0 }}>–</span>
              <span>{s}</span>
            </li>
          ))}
        </ul>

function App() {
  const [variant, setVariant] = React.useState("single");

  React.useEffect(() => {
    document.querySelectorAll(".variant-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.variant === variant);
      btn.onclick = () => setVariant(btn.dataset.variant);
    });
  }, [variant]);

  return variant === "single" ? <SingleColumnCV /> :
         variant === "two-col" ? <TwoColumnCV /> :
         <HybridCV />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
