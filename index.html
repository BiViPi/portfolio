<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phu Bui — Structural Draftsman · Portfolio</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
    /* 1. Global Reset & Variables */
    :root {
      /* True Navy accent scale */
      --color-accent:           #1F4E83;
      --color-accent-hover:     #163B66;
      --color-accent-active:    #0F2D50;
      --color-accent-soft:      #EEF5FC;
      --color-accent-soft-hover:#E3EFFB;
      --color-accent-border:    #BFD3EA;
      --color-accent-dark:      #0F3A66;
      --color-accent-dark-hover:#0B2F54;
      --color-accent-deep:      #082B4D;
      --color-accent-gradient-start: #0F4C81;
      --color-accent-gradient-end:   #082B4D;

      --color-text-main:   #111827;
      --color-text-muted:  #475569;
      --color-text-subtle: #64748B;

      --color-surface:      #FFFFFF;
      --color-surface-soft: #F8FAFC;
      --color-border:       #E2E8F0;

      --paper:      #F6F8FB;
      --paper-soft: #F8FAFC;
      --surface:    var(--color-surface);
      --ink:        var(--color-text-main);

      /* Text hierarchy */
      --navy-text-strong: #0F3A66;
      --navy-text-muted:  var(--color-text-muted);
      --navy-text-subtle: var(--color-text-subtle);
      --muted-1: var(--color-text-muted);
      --muted-2: var(--color-text-subtle);
      --muted-3: #94a3b8;

      /* Canonical accent aliases */
      --accent:             var(--color-accent);
      --accent-hover:       var(--color-accent-hover);
      --accent-active:      var(--color-accent-active);
      --accent-soft:        var(--color-accent-soft);
      --accent-soft-hover:  var(--color-accent-soft-hover);
      --accent-border:      var(--color-accent-border);
      --accent-dark:        var(--color-accent-dark);
      --accent-dark-hover:  var(--color-accent-dark-hover);
      --accent-2:           var(--color-accent);

      --line:       var(--color-border);
      --line-soft:  var(--color-surface-soft);
      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);

      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 24px;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Typographic hierarchy based on premium grid */
    .t-caption {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-text-muted);
    }
    
    .t-section {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--navy-text-muted);
      text-transform: uppercase;
    }

    .t-body-ink {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
    }

    .t-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted-2);
    }

    /* Grid structure & utilities */
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-desktop-menu {
      display: flex;
      gap: 4px;
      listStyle: none;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-desktop-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hamburger-btn {
      display: none;
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      color: var(--ink);
      cursor: pointer;
      transition: all 150ms var(--ease-out);
    }

    .hamburger-btn:hover {
      background: var(--accent-soft-hover);
    }

    /* Mobile navigation drawer */
    .mobile-drawer {
      display: none;
      position: fixed;
      top: 61px; /* Height of the sticky navbar */
      left: 0;
      width: 100%;
      background: rgba(246,248,251,0.98);
      backdrop-filter: blur(20px);
      WebkitBackdropFilter: blur(20px);
      border-bottom: 1px solid var(--line);
      padding: 24px 32px 36px;
      flex-direction: column;
      gap: 28px;
      z-index: 49;
      transform: translateY(-10px);
      opacity: 0;
      pointer-events: none;
      transition: transform 300ms var(--ease-out), opacity 300ms var(--ease-out);
    }

    .mobile-drawer.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-drawer-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .mobile-drawer-links a {
      display: block;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: all 150ms var(--ease-out);
    }

    .mobile-drawer-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    /* Page section container */
    .page-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px;
    }

    /* Responsive grid structures */
    .hero-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 84px 32px 96px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 64px;
      align-items: center;
    }

    .hero-title {
      font-size: 55px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin: 0;
      color: var(--ink);
    }

    .hero-subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted-1);
      max-width: 540px;
      margin-top: 24px;
    }

    .hero-blueprint-container {
      position: relative;
      width: 100%;
    }

    .hero-blueprint-card {
      background: linear-gradient(135deg, #0F4C81 0%, #082B4D 100%);
      border-radius: 16px;
      padding: 20px 16px 24px;
      aspect-ratio: 3/4;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
      position: relative;
      overflow: hidden;
      width: 95%;
      margin-left: auto;
      transition: all 250ms var(--ease-out);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* Skills Redesign */
    .skills-grid-new {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      transition: all 250ms var(--ease-out);
    }

    .skill-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-border);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    .core-skill-card {
      background: linear-gradient(135deg, #ffffff, #f7faff);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-md);
      padding: 28px 34px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      transition: all 250ms var(--ease-out);
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .core-skill-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-border);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    .core-card-illustration {
      position: absolute;
      right: 0;
      bottom: 0;
      top: 0;
      width: 35%;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .lang-strip {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-md);
      min-height: 84px;
      padding: 14px 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      margin-top: 18px;
      display: grid;
      grid-template-columns: auto repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: 0;
      transition: all 250ms var(--ease-out);
    }

    .lang-label-block {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-right: 24px;
      min-width: 0;
    }

    .core-skill-icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 10px 26px rgba(31, 78, 131, 0.18), inset 0 2px 4px rgba(255,255,255,0.6);
    }

    .core-skill-content {
      position: relative;
      z-index: 2;
      flex: 1;
      max-width: 660px;
    }

    .core-skill-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.22;
      color: var(--ink);
      letter-spacing: -0.015em;
      max-width: 760px;
    }

    .core-skill-desc {
      margin: 0 0 16px;
      color: var(--muted-1);
      font-size: 14px;
      line-height: 1.5;
      max-width: 620px;
    }

    .core-skill-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .core-skill-badge {
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-radius: 999px;
      border: 1px solid var(--accent-border);
      font-weight: 700;
      line-height: 1.25;
    }

    .skill-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .skill-card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .skill-card-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .skill-card-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .skill-card-divider {
      height: 1px;
      background: rgba(148, 163, 184, 0.15);
      margin-left: 24px;
    }

    .skill-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .skill-item-bullet {
      color: var(--accent);
      font-size: 14px;
      line-height: 1.1;
      margin-top: 1px;
    }

    .skill-item-content {
      flex: 1;
    }

    .skill-item-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.25;
    }

    .skill-item-badge {
      font-size: 10px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid var(--accent-border);
      line-height: 1.35;
    }

    .skill-item-desc {
      color: var(--navy-text-muted);
      font-size: 13px;
      margin-top: 3px;
      line-height: 1.45;
    }

    .lang-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
    }

    .lang-name {
      font-weight: 700;
      font-size: 13.5px;
      color: var(--ink);
      line-height: 1.2;
    }

    .lang-desc {
      font-size: 12px;
      color: var(--navy-text-muted);
      margin-top: 2px;
      line-height: 1.35;
    }

    .lang-strip:hover {
      transform: translateY(-2px);
      border-color: var(--accent-border);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    .lang-group {
      display: contents;
    }

    .lang-block {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
      padding: 0 24px;
      box-sizing: border-box;
      min-height: 58px;
    }

    .lang-block {
      border-left: 1px solid rgba(148, 163, 184, 0.22);
    }

    .lang-copy {
      min-width: 0;
    }

    .flag-frame {
      width: 42px;
      height: 31.5px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 7px;
      box-shadow: 0 2px 6px rgba(15,23,42,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .about-section {
      position: relative;
      background:
        radial-gradient(circle at 50% 100%, rgba(31, 78, 131, 0.09), transparent 34%),
        var(--paper-soft);
      padding: 96px 32px 40px;
      overflow: hidden;
    }

    .about-section::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(1036px, calc(100% - 64px));
      height: 120px;
      background: linear-gradient(180deg, rgba(8, 43, 77, 0) 0%, rgba(8, 43, 77, 0.09) 100%);
      filter: blur(28px);
      opacity: 0.8;
      pointer-events: none;
    }

    .about-grid {
      max-width: 1036px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 64px;
      align-items: start;
    }

    .about-avatar-wrapper {
      grid-column: span 4;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .about-portrait {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px -10px rgba(15,23,42,0.12), 0 4px 12px -5px rgba(15,23,42,0.06);
      background: var(--paper-soft);
    }

    .about-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .about-content {
      grid-column: span 8;
      max-width: 700px;
    }

    .about-title {
      margin: 0 0 24px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      text-wrap: balance;
    }

    .about-copy {
      display: flex;
      flex-direction: column;
      gap: 20px;
      color: var(--muted-1);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .about-copy p {
      margin: 0;
    }

    .about-stats {
      margin-top: 36px;
      display: flex;
      justify-content: space-between;
      max-width: 100%;
    }

    .about-stat {
      min-width: 0;
    }

    .about-stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .contact-section {
      background: var(--paper-soft);
      padding: 0 32px 96px;
      position: relative;
    }

    .contact-panel {
      max-width: 1036px;
      margin: 0 auto;
      padding: 88px 32px 96px;
      border-radius: 42px;
      background: linear-gradient(135deg, #0F4C81 0%, #082B4D 100%);
      color: #ffffff;
      box-shadow:
        0 34px 88px -36px rgba(8, 43, 77, 0.48),
        0 18px 36px -24px rgba(8, 43, 77, 0.24);
      position: relative;
      overflow: hidden;
    }

    .contact-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 32%);
      pointer-events: none;
    }

    .contact-inner {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      z-index: 1;
    }

    .contact-title {
      margin: 0;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.05;
    }

    /* Modal dialog */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      animation: fadeIn 200ms var(--ease-out) forwards;
      will-change: opacity;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      background: #FAFaf7;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: var(--radius-lg);
      max-height: 90vh;
      position: relative;
      overflow: hidden;
      box-shadow: 0 36px 90px -26px rgba(15,23,42,0.24), 0 18px 42px -24px rgba(15,23,42,0.18);
      animation: slideUp 300ms var(--ease-out) forwards;
      will-change: transform, opacity;
      transform: translate3d(0, 0, 0);
    }

    .modal-scroll {
      max-height: 90vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .modal-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .modal-header-image {
      position: relative;
      overflow: hidden;
      border-top-left-radius: inherit;
      border-top-right-radius: inherit;
    }

    .modal-body {
      padding: 40px 48px 48px;
      background: linear-gradient(180deg, #ffffff 0%, #FAFaf7 100%);
      border-bottom-left-radius: inherit;
      border-bottom-right-radius: inherit;
    }

    .modal-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 28px;
      padding-top: 20px;
      padding-bottom: 20px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid rgba(191, 211, 234, 0.72);
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 150ms var(--ease-out);
    }

    .close-btn:hover {
      background: rgba(15, 23, 42, 0.68);
      transform: scale(1.04);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 4. Responsive Breakpoints */
    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr;
        gap: 48px;
        padding-top: 80px;
        padding-bottom: 64px;
        text-align: center;
      }
      .hero-title {
        font-size: 44px;
      }
      .hero-grid p {
        margin-left: auto;
        margin-right: auto;
      }
      
      .hero-subtitle {
        margin-left: auto;
        margin-right: auto;
      }
      
      .hero-blueprint-card {
        width: 95%;
        max-width: 380px;
        margin: 0 auto;
      }
      
      .about-grid {
        grid-template-columns: 1fr;
        gap: 48px;
        text-align: left;
      }
      .about-avatar-wrapper {
        grid-column: span 12;
        align-items: center;
      }
      .about-content {
        grid-column: span 12;
        max-width: 100%;
      }
      .about-stats {
        margin-top: 32px;
      }

      .contact-section {
        padding: 8px 24px 72px;
      }
      .contact-panel {
        padding: 72px 28px 80px;
        border-radius: 34px;
      }
      
      .skills-grid-new {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .core-skill-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        padding: 24px;
      }
      .core-card-illustration {
        display: none;
      }
      .core-skill-content {
        max-width: 100%;
      }
      .core-skill-title {
        font-size: 20px;
      }
      .lang-strip {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 20px;
      }
      .lang-group {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .lang-label-block {
        padding-right: 0;
      }
      .lang-block {
        padding: 0;
        border-left: none;
      }
      .lang-block:not(:first-child) {
        border-top: 1px solid rgba(148, 163, 184, 0.22);
        padding-top: 16px;
        width: 100%;
      }
      
      /* Toggle mobile menu display */
      .nav-desktop-menu,

                onClick={(e) => { e.preventDefault(); handleNavClick(it.id); }}
                style={{
                  padding: "8px 14px",
                  borderRadius: 999,
                  color: active === it.id ? "var(--accent-dark)" : "var(--muted-2)",

              cursor: "pointer",
              fontFamily: "var(--font-mono)",
              color: "var(--accent-dark)",
              width: "100%",
            }}
          >
            {lang === "en" ? "Tiếng Việt (VI)" : "English (EN)"}

          <a

            onClick={(e) => { e.preventDefault(); handleNavClick("contact"); }}
            style={{

          >
            {lang === "en" ? "Get in touch" : "Liên hệ"}

        </div>
      </div>
    </nav>
  );
};

// ==========================================
// 4. Main Application Root
// ==========================================
function App() {
  const [lang, setLang] = React.useState("en");
  const [active, setActive] = React.useState("home");
  const [openProject, setOpenProject] = React.useState(null);

  React.useEffect(() => {
    document.documentElement.lang = lang;
  }, [lang]);

  const navigate = (id) => {
    setActive(id);
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.pageYOffset - 60;
      window.scrollTo({ top, behavior: "smooth" });
    }
  };

  const t = translations[lang];

  return (
    <>
      <PortfolioNav active={active} onNavigate={navigate} lang={lang} onToggleLang={() => setLang(lang === "en" ? "vi" : "en")} />
      <div id="home">
        <PortfolioHero
          lang={lang}
          t={t}
        />
      </div>
      <PortfolioProjects projects={projects[lang]} onOpen={setOpenProject} t={t} />
      <PortfolioSkills skillsData={skillsData[lang]} t={t} />
      <PortfolioAbout t={t} />
      <PortfolioContact t={t} />
      <CaseStudyModal project={openProject} onClose={() => setOpenProject(null)} t={t} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
